<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoreKeeper</title>
    <link rel="icon" type="image/png" href="/logo.png" />
  </head>
  <body>
    
    <script src="reader.js"></script>
    <script type="module" src="/src/main.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    
    <div id="loading-screen" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #1e2d3b; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease;">
        <div class="loader"></div>
        <h2 style="color: white; font-family: sans-serif; margin-top: 20px; letter-spacing: 2px;">LOREKEEPER</h2>
        <p id="loading-text" style="color: rgba(255,255,255,0.5); font-family: sans-serif; font-size: 14px;">Inizializzazione libreria...</p>
    </div>

    <style>
        /* Una semplice animazione a cerchio che ruota */
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #4da6ff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <div id="reader-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #faf9f6; z-index: 999; opacity: 0; transition: opacity 0.8s ease;">
        <div style="position: absolute; top: 10px; right: 20px; z-index: 1000; display: flex; gap: 10px;">
            <button id="theme-toggle-btn" class="glass-effect modern-btn" style="background: rgba(50,50,50,0.8); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer;">🌙 Dark Mode</button>  
            <button id="close-reader-btn" class="glass-effect modern-btn" style="background: rgba(200,50,50,0.8); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer;">&times; Chiudi Libro</button>
        </div>

        <div id="viewer" style="position: absolute; top: 60px; left: 10px; right: 10px; bottom: 40px; overflow: hidden;"></div>
        
        <button id="prev-page-btn" style="position: absolute; top: 50%; left: 10px; font-size: 24px; background: rgba(100,100,100,0.4); border-radius: 50%; color: white; border: none; cursor: pointer; z-index: 10; width: 45px; height: 45px; transform: translateY(-50%);">&#10094;</button>
        <button id="next-page-btn" style="position: absolute; top: 50%; right: 10px; font-size: 24px; background: rgba(100,100,100,0.4); border-radius: 50%; color: white; border: none; cursor: pointer; z-index: 10; width: 45px; height: 45px; transform: translateY(-50%);">&#10095;</button>
    </div>

    <button id="help-btn" class="glass-effect modern-btn" style="position: fixed; bottom: 30px; right: 30px; border-radius: 50%; width: 55px; height: 55px; font-size: 26px; padding: 0; z-index: 100; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.4);">
        ?
    </button>
  </body>
</html>
