<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La mia Libreria 3D</title>
  </head>
  <body>
    <script src="reader.js"></script>
    <script type="module" src="/src/main.js"></script>
    <!-- Librerie per leggere gli EPUB -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <!-- Interfaccia del Lettore (Nascosta di default) -->
    <!-- Interfaccia del Lettore -->
    <div id="reader-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #faf9f6; z-index: 999; opacity: 0; transition: opacity 0.8s ease;">
        <div style="position: absolute; top: 10px; right: 20px; z-index: 1000;">
            <button id="close-reader-btn" class="glass-effect modern-btn" style="background: rgba(0,0,0,0.5); color: white;">&times; Chiudi Libro</button>
        </div>
        <div id="viewer" style="width: 100%; height: 100vh; padding: 40px 20px; box-sizing: border-box;"></div>
        <button id="prev-page-btn" style="position: absolute; top: 50%; left: 20px; font-size: 30px; background: none; border: none; cursor: pointer;">&#10094;</button>
        <button id="next-page-btn" style="position: absolute; top: 50%; right: 20px; font-size: 30px; background: none; border: none; cursor: pointer;">&#10095;</button>
    </div>
  </body>
</html>
